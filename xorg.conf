Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0"
EndSection

Section "Device"
    Identifier     "Nvidia Card"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    
    # Forcefully ban the driver from checking or using the DVI port
    Option         "IgnoreDisplayDevices" "DFP-0"
    
    # Lock the target output strictly to the HDMI port
    Option         "ConnectedMonitor" "DFP-1"
    Option         "UseDisplayDevice" "DFP-1"
    
    # Prevent crashing if the HDMI handshake takes a few extra seconds
    Option         "AllowEmptyInitialConfiguration" "true"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Nvidia Card"
    DefaultDepth    24
    SubSection     "Display"
        Depth       24
        # Lock the resolution to match the physical testing monitor
        Modes      "1920x1080"
    EndSubSection
EndSection
